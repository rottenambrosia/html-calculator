<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel = "stylesheet" href="style.css">
</head>
<body class="body">

  <div id="calculator_body" class="mt-5 shadow-lg">
    <div id="calculator_header">
      BAY-SICK 69SX
    </div>
    <div id="calculator_display" class="text-end">0</div>
    <div id="calculator_keys">
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">1</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">2</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">3</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">(</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">4</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">5</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">6</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">)</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">7</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">8</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">9</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">rem</button>      
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">.</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">0</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">²</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">AC</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">+</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">-</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">*</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">⌫</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">/</button>      
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">!</button>
      <button class="btn btn-secondary calc-btn" onclick="keypress(this)">ⁿ</button>
      <button class="btn calc-btn"  style="background-color: coral; color: rgb(236, 204, 204); font-size: 2rem; border: black;" onclick="keypress(this)">=</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
